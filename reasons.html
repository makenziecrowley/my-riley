<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Riley &mdash; reasons</title>
<link rel="stylesheet" href="style.css">
<style>
  .reveal-box {
    text-align: center;
  }
  .reason-text {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.25rem;
    line-height: 1.6;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .counter {
    font-family: 'Karla', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 14px;
  }
  .edit-note {
    margin-top: 40px;
    font-family: 'Karla', sans-serif;
    font-size: 0.82rem;
    color: var(--paper-dim);
    opacity: 0.65;
    border-top: 1px solid rgba(246,238,224,0.15);
    padding-top: 18px;
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="index.html">&larr; back to the box</a>
  <span class="eyebrow">open one at a time</span>
  <h1 class="page-title">reasons that i love you</h1>
  <p class="page-sub">there are 10 here, but so much more in my heart.</p>

  <div class="card reveal-box">
    <div class="counter" id="counter">Reason 0 of 0</div>
    <p class="reason-text" id="reasonText">Tap the button whenever you're ready.</p>
    <button class="btn" id="nextBtn">show me a reason</button>
  </div>

  <footer class="sign">I love you, sweet boy</footer>
</div>

<script>
  // Psst, Makenzie: rewrite every line below in your own words.
  const reasons = [
    "you, my sweet boy, are the kindest person that i have ever met. you drop everything in seconds for your friends, or brothers, or me. i am eternally grateful and i feel so lucky to have someone so good around me all the time. you're such a great person and friend.",
    "you're going to make the best dad. first of all, you're so good with any kid you interact with. i'm consistently impressed by you. secondly, you know exactly how you want to parent already. i guarantee you most people don't know until they're in the thick of it. you're just genuinely going to be the best dad ever, riley.",
    "you analogies. they can sometimes be so silly, but honestly, they all work so well. i always love when i can tell one is coming, and i get to prepare myself to have to hold back my laughter, but it always fizzles out when i realize how true your analogy really is.",
    "those beautiful eyes and that perfect smile. i've gotta think of my kids here, and honestly, they are going to be blessed genetically if they get your genes. no baldness incoming, the most beautfiul eyes and longest eyelashes, the most perfect cutie little nose, etc. only the tip of the iceburg that is your perfection.",
    "[reason five]",
    "[reason six]",
    "[reason seven]",
    "[reason eight]",
    "[reason nine]",
    "[reason ten]"
  ];

  let order = [];
  let pointer = 0;

  function shuffle() {
    order = reasons.map((_, i) => i).sort(() => Math.random() - 0.5);
    pointer = 0;
  }

  function updateCounter() {
    document.getElementById('counter').textContent = `Reason ${pointer} of ${reasons.length}`;
  }

  document.getElementById('nextBtn').addEventListener('click', () => {
    if (pointer >= order.length) {
      shuffle();
      document.getElementById('reasonText').textContent = "That's all of them for now \u2014 but there's always more. Start again?";
      updateCounter();
      return;
    }
    document.getElementById('reasonText').textContent = reasons[order[pointer]];
    pointer++;
    updateCounter();
  });

  shuffle();
  updateCounter();

  (function(){
    var key='rileyVisited';
    var visited = JSON.parse(localStorage.getItem(key) || '[]');
    var page = 'reasons';
    if (visited.indexOf(page) === -1) { visited.push(page); localStorage.setItem(key, JSON.stringify(visited)); }
  })();
</script>
</body>
</html>
